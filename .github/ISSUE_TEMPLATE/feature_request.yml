name: Feature Request
description: Suggest a new template, prompt, script, or improvement to RepoDocs AI
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to RepoDocs AI.

        **Before submitting:** please check [existing issues](https://github.com/SulagnaSasmal/repodocs-ai/issues) and the [ROADMAP.md](https://github.com/SulagnaSasmal/repodocs-ai/blob/main/ROADMAP.md) to see if this is already planned.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area of RepoDocs AI would this improve?
      options:
        - New template (API, product, feature, architecture, operations, governance)
        - New prompt (generation, review, migration)
        - New validation script or check
        - New automation script
        - Control plane improvement
        - Export integration (Confluence, Notion, Google Docs, PDF, other)
        - CI / GitHub Actions workflow
        - Platform starter (MkDocs, Docusaurus, GitBook, Next.js, other)
        - Documentation site / GitHub Pages
        - AI / LLM integration
        - Developer experience / Quick Start
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this feature solve? Who benefits and how?
      placeholder: "When documenting a GraphQL API, there is no template that covers queries, mutations, and subscriptions..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see added or changed?
      placeholder: |
        Add a `templates/api/graphql-overview.md` template with sections for:
        - Schema overview
        - Queries
        - Mutations
        - Subscriptions
        - Error handling
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to your workflow?
      options:
        - Critical — blocking my adoption of RepoDocs AI
        - High — would significantly improve my workflow
        - Medium — nice to have
        - Low — minor improvement
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Examples, references, related issues, or mockups that illustrate the request
