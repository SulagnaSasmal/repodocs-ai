name: Export Documentation Formats

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/**
      - examples/**
      - scripts/export-docs.mjs
      - scripts/lib/docs-automation-utils.mjs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Confluence, Google Docs, and PDF export artifacts
        run: npm run export

      - name: Upload export artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repodocs-ai-exports
          path: exports