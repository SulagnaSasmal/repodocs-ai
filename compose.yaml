services:
  redis:
    image: redis:7-alpine
    container_name: repodocs-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - repodocs-ai-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repodocs-ai-control-plane
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      REPODOCS_CONTROL_PLANE_HOST: 0.0.0.0
      REPODOCS_CONTROL_PLANE_PORT: 4312
      REPODOCS_CONTROL_PLANE_DATA_DIR: /var/data/control-plane
      REPODOCS_CONTROL_PLANE_BOOTSTRAP_USER: admin
      REPODOCS_CONTROL_PLANE_BOOTSTRAP_DISPLAY_NAME: RepoDocs Admin
      REPODOCS_CONTROL_PLANE_BOOTSTRAP_KEY: ${REPODOCS_CONTROL_PLANE_BOOTSTRAP_KEY:-replace-me}
    ports:
      - "4312:4312"
    volumes:
      - repodocs-ai-control-plane-data:/var/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4312/health').then((response)=>{if(!response.ok){process.exit(1);}return response.json();}).then((payload)=>{if(payload.status!=='ok'){process.exit(1);}}).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  repodocs-ai-redis-data:
  repodocs-ai-control-plane-data: