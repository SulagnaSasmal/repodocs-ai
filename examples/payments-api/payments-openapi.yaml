openapi: 3.0.3
info:
  title: Startup Payments API
  version: v1
  description: API for creating payments, retrieving payment details, and issuing refunds.
  x-intended-consumers:
    - checkout applications
    - finance and reconciliation tooling
    - customer support operations tools
  x-versioning-strategy: Breaking changes are introduced in new major API versions. Backward-compatible additions remain within the current version.
  x-rate-limits: Payment creation and refund operations are limited to 60 requests per minute per client, while read endpoints support 120 requests per minute.
  x-error-handling: The API uses standard HTTP status codes with a JSON error envelope that includes `code`, `message`, and `request_id`.
  x-sdk-support: Official JavaScript and Python SDKs are available for payment creation, retrieval, and refund workflows.
  x-example-use-case: A checkout client creates a payment during purchase, retrieves the payment state after processing, and submits a partial refund when a duplicate charge is reported.
  x-security-impact: high
servers:
  - url: https://api.startup-payments.example/v1
paths:
  /payments:
    post:
      summary: Create payment
      description: Create a payment for a customer checkout session.
      x-performance-notes: Write requests should include an idempotency key and should complete within 5 seconds under normal load.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - currency
                - customer_id
              properties:
                amount:
                  type: number
                  description: Payment amount in major currency units.
                  example: 125.5
                currency:
                  type: string
                  description: ISO 4217 currency code.
                  example: USD
                customer_id:
                  type: string
                  description: Unique customer identifier.
                  example: cus_123
                payment_method_id:
                  type: string
                  description: Saved payment method identifier.
                  example: pm_123
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_id:
                    type: string
                    example: pay_123
                  status:
                    type: string
                    example: pending
                  amount:
                    type: number
                    example: 125.5
                  currency:
                    type: string
                    example: USD
        '400':
          description: Invalid payment request
        '401':
          description: Unauthorized
        '409':
          description: Duplicate payment submission
  /payments/{id}:
    get:
      summary: Retrieve payment
      description: Retrieve the current state and metadata for a payment.
      x-performance-notes: Suitable for payment detail screens and audit lookups. Short-lived client-side caching is recommended for polling workflows.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Unique payment identifier.
          schema:
            type: string
      responses:
        '200':
          description: Payment retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_id:
                    type: string
                    example: pay_123
                  status:
                    type: string
                    example: completed
                  amount:
                    type: number
                    example: 125.5
                  currency:
                    type: string
                    example: USD
        '401':
          description: Unauthorized
        '404':
          description: Payment not found
  /payments/refund:
    post:
      summary: Refund payment
      description: Issue a refund against a completed payment.
      x-performance-notes: Refund creation is asynchronous for downstream ledger settlement and should be retried with the same idempotency key on timeout.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_id
                - amount
              properties:
                payment_id:
                  type: string
                  description: Payment to refund.
                  example: pay_123
                amount:
                  type: number
                  description: Refund amount in major currency units.
                  example: 25
                reason:
                  type: string
                  description: Optional human-readable refund reason.
                  example: duplicate charge
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema:
                type: object
                properties:
                  refund_id:
                    type: string
                    example: ref_123
                  payment_id:
                    type: string
                    example: pay_123
                  status:
                    type: string
                    example: pending
        '400':
          description: Invalid refund request
        '401':
          description: Unauthorized
        '404':
          description: Payment not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT